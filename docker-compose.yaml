services:
  app:
    restart: unless-stopped
    env_file:
      - .env
    image: app
    build:
      dockerfile: ./Dockerfile
      context: ./
    environment:
      dsn: postgresql+asyncpg://postgres:password@pg/users
      rabbitmq_url: amqp://local:local@rabbitmq:5672/
      redis_url: redis://redis:6379
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      pg:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-network
      - remnawave-network

  redis:
    restart: unless-stopped
    image: redis:latest
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    command: ["redis-server"]
    networks:
      - bot-network

  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: local
      RABBITMQ_DEFAULT_PASS: local
    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  pg:
    image: postgres:latest
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  taskiq-scheduler:
    image: app
    build:
      dockerfile: ./Dockerfile
      context: ./
    container_name: taskiq-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      dsn: postgresql+asyncpg://postgres:password@pg/users
      rabbitmq_url: amqp://local:local@rabbitmq:5672/
      redis_url: redis://redis:6379
    depends_on:
      pg:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "taskiq scheduler src.client.taskiq:scheduler"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[t]askiq scheduler'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - bot-network

volumes:
  redis-data:
    driver: local
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
    driver: local

configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."

networks:
  bot-network:
    driver: bridge
  remnawave-network:
    external: true
